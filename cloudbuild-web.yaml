# Cloud Build for VantAIge Next.js
# Uses Artifact Registry (recommended over legacy gcr.io)
# Substitutions: _WS_URL, _REGION, _SUPABASE_URL, _SUPABASE_ANON_KEY
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '--build-arg'
      - 'NEXT_PUBLIC_WS_URL=${_WS_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}'
      - '--build-arg'
      - 'NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/vantaige:${BUILD_ID}'
      - '.'
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/vantaige:${BUILD_ID}'
    waitFor: ['build']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vantaige'
      - '--image'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/vantaige:${BUILD_ID}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push']

substitutions:
  _REGION: us-central1
  _WS_URL: ''
  _SUPABASE_URL: ''
  _SUPABASE_ANON_KEY: ''

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/vantaige:${BUILD_ID}'

options:
  logging: CLOUD_LOGGING_ONLY
